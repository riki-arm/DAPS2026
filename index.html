<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAPS 2026</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f1f5f9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.app {
    width: 100%;
    max-width: 380px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    overflow: hidden;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
    font-weight: 600;
    font-size: 18px;
    border-bottom: 1px solid #eee;
}

/* LOGIN */
.login {
    padding: 25px;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2563eb;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

button:active {
    transform: scale(0.98);
}

/* LOADING */
.loading {
    font-size: 13px;
    color: #64748b;
}

/* CAMERA */
#reader {
    width: 100%;
}

/* STATUS */
.status {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    color: #64748b;
}

/* SUCCESS */
.success {
    color: #16a34a;
    font-weight: 600;
}

/* ERROR */
.error {
    color: #dc2626;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div id="login-box">
    <div class="header">DAPS 2026</div>

    <div class="login">
        <input type="text" id="kode" placeholder="Kode akses">
        <button onclick="login()">Masuk</button>
        <div id="login-status" class="loading"></div>
    </div>
</div>

<!-- SCANNER -->
<div id="app-box" style="display:none;">
    <div class="header">Scan Barcode</div>
    <div id="reader"></div>
    <div id="status-text" class="status">Siap memindai...</div>
</div>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxdol6Bk2Ciq4f-VHA5igfuE4QroqAXfNUG5l255v85gkLcp5Hg8VgwyXPbvS35RrVnvQ/exec";

let isScanning = true;

// 🔊 BEEP
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// LOGIN (DIPERCEPAT UX)
function login() {
    const kode = document.getElementById("kode").value;
    const status = document.getElementById("login-status");

    if (!kode) {
        status.innerText = "Masukkan kode!";
        return;
    }

    status.innerText = "Memeriksa akses...";

    fetch(WEB_APP_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ type: "login", kode: kode })
    })
    .then(res => res.json())
    .then(data => {
        if (data.valid) {
            status.innerText = "Akses diterima";
            status.style.color = "green";

            setTimeout(() => {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("app-box").style.display = "block";
                startScanner();
            }, 300);

        } else {
            status.innerText = "Akses ditolak!";
            status.style.color = "red";
        }
    })
    .catch(() => {
        status.innerText = "Koneksi bermasalah";
        status.style.color = "red";
    });
}

// SCANNER
function startScanner() {
    const statusText = document.getElementById("status-text");

    function onScanSuccess(decodedText) {
        if (!isScanning) return;

        isScanning = false;
        statusText.innerText = "Memproses...";
        statusText.className = "status";

        fetch(WEB_APP_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ type: "scan", nama: decodedText })
        })
        .then(res => res.json())
        .then(() => {

            beep.play();

            statusText.innerText = "✔ Berhasil: " + decodedText;
            statusText.className = "status success";

            setTimeout(() => {
                statusText.innerText = "Siap memindai...";
                statusText.className = "status";
                isScanning = true;
            }, 1200);
        })
        .catch(() => {
            statusText.innerText = "Gagal kirim!";
            statusText.className = "status error";
            setTimeout(() => { isScanning = true; }, 2000);
        });
    }

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: 230 },
        onScanSuccess
    );
}
</script>

</body>
</html>
