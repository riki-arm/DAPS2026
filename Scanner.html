<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DAPS 2026</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --p: #2563eb; --s: #10b981; --w: #f59e0b; --e: #ef4444; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #1e293b; }
    .header { width: 100%; padding: 20px 0; text-align: center; border-bottom: 1px solid #f1f5f9; background: #fff; position: sticky; top: 0; z-index: 10; }
    #reader { width: 90%; max-width: 400px; border-radius: 24px; overflow: hidden; margin-top: 20px; border: 4px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    #res { width: 85%; max-width: 350px; margin-top: 20px; padding: 25px; border-radius: 24px; text-align: center; background: #f8fafc; border: 1px solid #e2e8f0; transition: 0.3s; }
    .success { background: #f0fdf4 !important; border-color: var(--s) !important; }
    .warning { background: #fffbeb !important; border-color: var(--w) !important; }
    .error { background: #fef2f2 !important; border-color: var(--e) !important; }
    #nm { font-size: 1.4rem; font-weight: 800; margin: 10px 0; line-height: 1.2; }
    .box { display: flex; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.05); }
    .item { flex: 1; }
    .val { font-size: 1rem; font-weight: 700; display: block; }
    .lab { font-size: 0.6rem; font-weight: 600; opacity: 0.5; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="header">
    <h1 style="font-size: 1.2rem; color: var(--p); margin: 0;">DAPS 2026</h1>
    <div style="font-size: 0.7rem; font-weight: 700; opacity: 0.5;">SISTEM ABSENSI OTOMATIS</div>
  </div>

  <div id="reader"></div>
  
  <div id="res">
    <div id="st" style="font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">SIAP SCAN</div>
    <div id="nm">-</div>
    <div class="box">
      <div class="item"><span id="kl" class="val">-</span><span class="lab">KELAS</span></div>
      <div class="item" style="border-left: 1px solid rgba(0,0,0,0.05);"><span id="wk" class="val">-</span><span class="lab">JAM MASUK</span></div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz2ZhkALonLoROw4Cp2wQ7aTk-iGcwqIrjIfxhtyJk_-jRcLt4kPMPIjacBT0_i-yNK/exec"; 
    let isProcessing = false;

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;
      document.getElementById('st').innerText = "MEMPROSES DATA...";
      
      fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ id: decodedText })
      })
      .then(r => r.json())
      .then(res => {
        const container = document.getElementById('res');
        container.className = res.status.toLowerCase();
        document.getElementById('nm').innerText = res.nama || res.title || "TIDAK DIKENAL";
        document.getElementById('kl').innerText = res.kelas || "-";
        document.getElementById('wk').innerText = res.waktu || "-";
        document.getElementById('st').innerText = res.status === "Success" ? "BERHASIL HADIR" : "PERINGATAN!";
        
        setTimeout(() => {
          isProcessing = false;
          container.className = "";
          document.getElementById('st').innerText = "SIAP SCAN";
        }, 3000);
      })
      .catch(err => {
        isProcessing = false;
        alert("Gagal koneksi ke server");
      });
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
  </script>
</body>
</html>
